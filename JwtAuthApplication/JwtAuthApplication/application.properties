# H2 Database (runs in memory — no installation needed)
spring.datasource.url=jdbc:h2:mem:jwtdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (visit: http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JWT Secret Key (must be at least 256 bits = 32 chars for HS256)
jwt.secret=my-super-secret-key-which-is-very-long-and-secure-for-jwt
jwt.expiration=86400000
# 86400000 ms = 24 hours

server.port=8080